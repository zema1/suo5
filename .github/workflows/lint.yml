name: Run linters
on:
  push:
    branches:
    - main
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - run: go mod download
      - uses: golangci/golangci-lint-action@v8
        with:
          skip-cache: true
