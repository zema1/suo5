name: Run Suo5 Tests
description: Run standard suo5 tests with optional no-gzip flag
inputs:
  no_gzip:
    description: "Add -no-gzip flag to tests"
    default: 'false'
    required: false
  test_auto:
    description: "Run auto mode tests"
    default: 'true'
    required: false
  test_full:
    description: "Run full mode tests"
    default: 'true'
    required: false
  test_half:
    description: "Run half mode tests"
    default: 'true'
    required: false
  test_classic:
    description: "Run classic mode tests"
    default: 'true'
    required: false
  test_inner:
    description: "Run nginx inner URL tests"
    default: 'true'
    required: false
  test_top:
    description: "Run nginx top URL tests"
    default: 'true'
    required: false
  test_redirect:
    description: "Run redirect URL tests"
    default: 'true'
    required: false
  redirect_path:
    description: "Redirect path for building redirect URL"
    default: '/assets/suo5.jsp'
    required: false
  nginx_url:
    description: "Nginx URL for tests"
    default: 'http://127.0.0.1:80/assets/suo5.jsp'
    required: false
  nginx_inner_url:
    description: "Nginx inner URL for tests"
    default: 'http://127.0.0.1:81/assets/suo5.jsp'
    required: false
  direct_url:
    description: "Direct URL for tests"
    default: 'http://127.0.0.1:82/assets/suo5.jsp'
    required: false
  service_port:
    description: "Service port for the application"
    required: true
  reliability_modes:
    description: "Space-separated modes that run the large-response reliability suite"
    default: ''
    required: false
  reliability_echo_workers:
    description: "Echo workers used by the reliability suite"
    default: '50'
    required: false
  reliability_echo_requests:
    description: "Echo requests per worker used by the reliability suite"
    default: '30'
    required: false
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -ex
        ./helper ready -u ${{ inputs.direct_url }} -t 60
        chmod +x ./suo5_test ./mbtest

        SRV1_ID=$(docker compose ps -q srv1)
        NETWORK=$(docker inspect "$SRV1_ID" --format '{{range $name, $_ := .NetworkSettings.Networks}}{{$name}}{{end}}')
        TARGET_HOST=$(docker network inspect "$NETWORK" --format '{{(index .IPAM.Config 0).Gateway}}')
        REMOTE_TEST_URL="http://${TARGET_HOST}:9976/echo"
        CLIENT_PID=""

        ./mbtest -listen 0.0.0.0:9976 -serve-only >mbtest-target.log 2>&1 &
        TARGET_PID=$!

        cleanup_client() {
          if [ -n "${CLIENT_PID:-}" ]; then
            kill "$CLIENT_PID" 2>/dev/null || true
            wait "$CLIENT_PID" 2>/dev/null || true
            CLIENT_PID=""
          fi
        }

        cleanup_all() {
          cleanup_client
          kill "$TARGET_PID" 2>/dev/null || true
          wait "$TARGET_PID" 2>/dev/null || true
        }
        trap cleanup_all EXIT

        ./helper ready -u http://127.0.0.1:9976/echo -t 10

        # Set gzip flag based on input
        GZIP_FLAG=""
        if [ "${{ inputs.no_gzip }}" = "true" ]; then
          GZIP_FLAG="-no-gzip"
        fi

        # Redirect URL
        REDIRECT_URL=""
        if [ "${{ inputs.test_redirect }}" = "true" ]; then
          SRV3_IP=$(docker inspect $(docker ps --filter "label=com.docker.compose.service=srv3" --format "{{.ID}}") --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          REDIRECT_URL="http://$SRV3_IP:${{ inputs.service_port }}${{ inputs.redirect_path }}"
          echo "Redirect URL: $REDIRECT_URL"
        fi

        # Helper function to run test if enabled
        run_test() {
          local enabled=$1
          local url=$2
          local mode=$3
          local retry=$4
          local redirect=$5
          local dirty=$6

          if [ "$enabled" = "true" ]; then
            DIRTY_FLAG=""
            if [ -n "$dirty" ] && [ "$dirty" != "0" ]; then
              DIRTY_FLAG="-jk $dirty"
            fi
            ./suo5_test -debug -t "$url" -T "$REMOTE_TEST_URL" -mode "$mode" $GZIP_FLAG --retry $retry -r "$redirect" $DIRTY_FLAG
          fi
        }

        echo "Run direct URL tests"
        run_test "${{ inputs.test_auto }}" "${{ inputs.direct_url }}" "auto" 0 "" ""
        run_test "${{ inputs.test_auto }}" "${{ inputs.direct_url }}" "auto" 0 "" "8192"
        run_test "${{ inputs.test_full }}" "${{ inputs.direct_url }}" "full" 0 "" ""
        run_test "${{ inputs.test_full }}" "${{ inputs.direct_url }}" "full" 0 "" "8192"
        run_test "${{ inputs.test_half }}" "${{ inputs.direct_url }}" "half" 0 "" ""
        run_test "${{ inputs.test_half }}" "${{ inputs.direct_url }}" "half" 0 "" "8192"
        run_test "${{ inputs.test_classic }}" "${{ inputs.direct_url }}" "classic" 0 "" ""
        run_test "${{ inputs.test_classic }}" "${{ inputs.direct_url }}" "classic" 0 "" "8192"

        if [ "${{ inputs.test_inner }}" = "true" ]; then
          echo "Run nginx inner URL tests with retry"
          run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_inner_url }}" "auto" 5 "" ""
          run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_inner_url }}" "auto" 5 "" "8192"
          run_test "${{ inputs.test_half }}" "${{ inputs.nginx_inner_url }}" "half" 5 "" ""
          run_test "${{ inputs.test_half }}" "${{ inputs.nginx_inner_url }}" "half" 5 "" "8192"
          run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_inner_url }}" "classic" 5 "" ""
          run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_inner_url }}" "classic" 5 "" "8192"

          if [ "${{ inputs.test_redirect }}" = "true" ]; then
            echo "Run nginx inner URL tests with redirect"
            run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_inner_url }}" "auto" 5 "$REDIRECT_URL" ""
            run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_inner_url }}" "auto" 5 "$REDIRECT_URL" "8192"
            run_test "${{ inputs.test_half }}" "${{ inputs.nginx_inner_url }}" "half" 5 "$REDIRECT_URL" ""
            run_test "${{ inputs.test_half }}" "${{ inputs.nginx_inner_url }}" "half" 5 "$REDIRECT_URL" "8192"
            run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_inner_url }}" "classic" 5 "$REDIRECT_URL" ""
            run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_inner_url }}" "classic" 5 "$REDIRECT_URL" "8192"
          fi
        fi

        if [ "${{ inputs.test_top }}" = "true" ]; then
          echo "Run nginx TOP URL tests with retry"
          run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_url }}" "auto" 5 "" ""
          run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_url }}" "auto" 5 "" "8192"
          run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_url }}" "classic" 5 "" ""
          run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_url }}" "classic" 5 "" "8192"

          if [ "${{ inputs.test_redirect }}" = "true" ]; then
            echo "Run nginx TOP URL tests with redirect"
            run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_url }}" "auto" 5 "$REDIRECT_URL" ""
            run_test "${{ inputs.test_auto }}" "${{ inputs.nginx_url }}" "auto" 5 "$REDIRECT_URL" "8192"
            run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_url }}" "classic" 5 "$REDIRECT_URL" ""
            run_test "${{ inputs.test_classic }}" "${{ inputs.nginx_url }}" "classic" 5 "$REDIRECT_URL" "8192"
          fi
        fi

        if [ -n "${{ inputs.reliability_modes }}" ]; then
          echo "Run large-response reliability tests: ${{ inputs.reliability_modes }}"
          RELIABILITY_MODES="${{ inputs.reliability_modes }}"

          TEST_PORT=11120

          for mode in $RELIABILITY_MODES; do
            CLIENT_LOG="suo5-reliability-${mode}.log"
            ./suo5_test -debug -t "${{ inputs.direct_url }}" -mode "$mode" \
              $GZIP_FLAG --retry 0 -l "127.0.0.1:${TEST_PORT}" >"$CLIENT_LOG" 2>&1 &
            CLIENT_PID=$!

            ready=false
            for _ in $(seq 1 50); do
              if ! kill -0 "$CLIENT_PID" 2>/dev/null; then
                echo "suo5 client exited before reliability tests"
                cat "$CLIENT_LOG"
                exit 1
              fi
              if (echo >"/dev/tcp/127.0.0.1/${TEST_PORT}") 2>/dev/null; then
                ready=true
                break
              fi
              sleep 0.1
            done
            if [ "$ready" != "true" ]; then
              echo "suo5 client did not listen on ${TEST_PORT}"
              cat "$CLIENT_LOG"
              exit 1
            fi

            if ! ./mbtest -listen 0.0.0.0:9977 -target "${TARGET_HOST}:9977" \
              -proxy "127.0.0.1:${TEST_PORT}" \
              -echo-workers "${{ inputs.reliability_echo_workers }}" \
              -echo-requests "${{ inputs.reliability_echo_requests }}"; then
              cat "$CLIENT_LOG"
              exit 1
            fi

            cleanup_client
            TEST_PORT=$((TEST_PORT + 1))
          done
        fi
